<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - SAI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

<!-- Navigation Bar -->
<nav class="bg-white border-b border-gray-200 fixed w-full z-20 top-0 left-0">
    <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
        <!-- Logo / Brand -->
        <a href="home.html" class="flex items-center space-x-2 rtl:space-x-reverse">
            <span class="self-center text-2xl font-semibold whitespace-nowrap">SAI Assistant</span>
        </a>
        <!-- Hamburger Button (Mobile) -->
        <button id="menu-toggle" type="button" class="inline-flex items-center p-2 w-10 h-10 justify-center text-gray-500 rounded-lg md:hidden hover:bg-gray-100 focus:outline-none focus:ring-2">
            <span class="sr-only">Open main menu</span>
            <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 17 14">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M1 1h15M1 7h15M1 13h15"/>
            </svg>
        </button>
        <!-- Menu Links -->
        <div class="hidden w-full md:block md:w-auto" id="navbar-default">
            <ul class="font-medium flex flex-col p-4 md:p-0 mt-4 border border-gray-100 rounded-lg bg-gray-50 md:flex-row md:space-x-8 md:mt-0 md:border-0 md:bg-white">
                <li><a href="home.html" class="block py-2 px-3 text-gray-900 rounded hover:bg-gray-100 md:hover:bg-transparent md:hover:text-blue-600">Home</a></li>
                <li><a href="about.html" class="block py-2 px-3 text-gray-900 rounded hover:bg-gray-100 md:hover:bg-transparent md:hover:text-blue-600">About</a></li>
                <li><a href="features.html" class="block py-2 px-3 text-gray-900 rounded hover:bg-gray-100 md:hover:bg-transparent md:hover:text-blue-600">Features</a></li>
                <li><a href="contact.html" class="block py-2 px-3 text-gray-900 rounded hover:bg-gray-100 md:hover:bg-transparent md:hover:text-blue-600">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Contact Section -->
<section class="flex-1 max-w-2xl mx-auto w-full px-4 py-6 pt-28 pb-24">
    <div class="bg-white rounded-lg shadow-md p-8 border border-gray-200">
        <h2 class="text-3xl font-bold mb-4 text-blue-600">Contact Us</h2>
        <p class="mb-6 text-gray-700">We'd love to hear from you! Please fill out the form below and we'll get back to you as soon as possible.</p>
        <form id="contactForm" class="space-y-4">
            <div>
                <label for="name" class="block text-gray-800 font-medium mb-1">Name</label>
                <input type="text" id="name" name="name" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600" required>
            </div>
            <div>
                <label for="email" class="block text-gray-800 font-medium mb-1">Email</label>
                <input type="email" id="email" name="email" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600" required>
            </div>
            <div>
                <label for="message" class="block text-gray-800 font-medium mb-1">Message</label>
                <textarea id="contact-message" name="message" rows="4" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600" required></textarea>
            </div>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg">Send Message</button>
        </form>
        <div id="contact-success" class="mt-4 text-green-600 hidden">Thank you for contacting us!</div>
    </div>
</section>

<script>
    // Hamburger menu
    const menuToggle = document.getElementById("menu-toggle"); 
    const navbar = document.getElementById("navbar-default"); 
    menuToggle.addEventListener("click", () => { 
        navbar.classList.toggle("hidden"); 
    });

    // Contact form logic
    document.getElementById('contactForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const message = document.getElementById('contact-message').value;
        try {
            const response = await fetch('/api/contact', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, message })
            });
            if (response.ok) {
                document.getElementById('contact-success').classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('contact-success').classList.add('hidden');
                    window.location.href = "home.html";
                }, 2000);
                this.reset();
            } else {
                alert('Failed to send contact. Please try again.');
            }
        } catch (err) {
            alert('Error sending contact. Please try again.');
        }
    });
</script>
</body>
</html>
