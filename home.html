<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAI Chat Assistant - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .typing-animation { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background-color: #6b7280; animation: typing 1.4s infinite ease-in-out; }
        .typing-animation:nth-child(1) { animation-delay: -0.32s; }
        .typing-animation:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }
        .message-enter { animation: messageSlide 0.3s ease-out; }
        @keyframes messageSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

<!-- Navigation Bar -->
<nav class="bg-white border-b border-gray-200 fixed w-full z-20 top-0 left-0">
    <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
        <a href="home.html" class="flex items-center space-x-2 rtl:space-x-reverse">
            <span class="self-center text-2xl font-semibold whitespace-nowrap">SAI Assistant</span>
        </a>
        <button id="menu-toggle" type="button" class="inline-flex items-center p-2 w-10 h-10 justify-center text-gray-500 rounded-lg md:hidden hover:bg-gray-100 focus:outline-none focus:ring-2">
            <span class="sr-only">Open main menu</span>
            <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 17 14">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M1 1h15M1 7h15M1 13h15"/>
            </svg>
        </button>
        <div class="hidden w-full md:block md:w-auto" id="navbar-default">
            <ul class="font-medium flex flex-col p-4 md:p-0 mt-4 border border-gray-100 rounded-lg bg-gray-50 md:flex-row md:space-x-8 md:mt-0 md:border-0 md:bg-white">
                <li><a href="home.html" class="block py-2 px-3 text-gray-900 rounded hover:bg-gray-100 md:hover:bg-transparent md:hover:text-blue-600">Home</a></li>
                <li><a href="about.html" class="block py-2 px-3 text-gray-900 rounded hover:bg-gray-100 md:hover:bg-transparent md:hover:text-blue-600">About</a></li>
                <li><a href="features.html" class="block py-2 px-3 text-gray-900 rounded hover:bg-gray-100 md:hover:bg-transparent md:hover:text-blue-600">Features</a></li>
            </ul>
        </div>
    </div>
</nav>


<!-- Chat Container -->
<main class="flex-1 max-w-4xl mx-auto w-full px-4 py-6 pt-28 pb-24">
    <div id="chatContainer" class="space-y-6 mb-6">
        <!-- Welcome Message -->
        <div class="flex items-start space-x-3 message-enter">
            <div class="w-8 h-8 bg-gradient-to-r from-blue-500 to-purple-600 rounded-full flex items-center justify-center flex-shrink-0">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                </svg>
            </div>
            <div class="bg-white rounded-lg px-4 py-3 shadow-sm border border-gray-200 max-w-3xl">
                <p class="text-gray-800">Hello! I'm your AI assistant. I can help answer questions and have conversations with you. What would you like to know?</p>
                <p class="text-xs text-gray-500 mt-2">Note: This is a beta interface. SAI is still learning and improving, You are one of the earliest users. Stay Tuned! Stay Connected!</p>
            </div>
        </div>
    </div>
    <!-- Input Area -->
    <div class="sticky bottom-0 bg-gray-50 pt-4">
        <div class="bg-white rounded-lg border border-gray-300 shadow-sm">
            <div class="flex items-end space-x-3 p-4">
                <textarea 
                    id="messageInput" 
                    placeholder="Type your message here..." 
                    class="flex-1 resize-none border-0 focus:ring-0 focus:outline-none text-gray-800 placeholder-gray-500 max-h-32"
                    rows="1"
                    onkeydown="handleKeyDown(event)"
                    oninput="autoResize(this)"
                ></textarea>
                <button 
                    id="sendButton"
                    onclick="sendMessage()" 
                    class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors flex items-center space-x-2 disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                    </svg>
                    <span>Send</span>
                </button>
            </div>
        </div>
    </div>
</main>

<script>
    // Hamburger menu
    const menuToggle = document.getElementById("menu-toggle");
    const navbar = document.getElementById("navbar-default");
    menuToggle.addEventListener("click", () => {
        navbar.classList.toggle("hidden");
    });
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('messageInput').focus();
    });
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
<script src="sai_math.js"></script>
<script src="sai.js"></script>
</body>
</html>
